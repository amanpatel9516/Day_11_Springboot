version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cinebook_profiledb
      POSTGRES_USER: sa
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cinebook-net

  eureka-server:
    build:
      context: ./backend/eureka-server
    ports:
      - "8050:8050"
    networks:
      - cinebook-net

  profile-service:
    build:
      context: ./backend/profile-service
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_URL=http://eureka-server:8050/eureka/
      - DATABASE_URL=jdbc:postgresql://postgres:5432/cinebook_profiledb
      - DATABASE_USERNAME=sa
      - DATABASE_PASSWORD=password
    ports:
      - "8052:8052"
    depends_on:
      - postgres
      - eureka-server
    networks:
      - cinebook-net

  gateway:
    build:
      context: ./backend/gateway
    environment:
      - EUREKA_URL=http://eureka-server:8050/eureka/
    ports:
      - "8051:8051"
    depends_on:
      - eureka-server
    networks:
      - cinebook-net

volumes:
  postgres-data:

networks:
  cinebook-net:
    driver: bridge
