spring.application.name=profile-service

server.port=8052

eureka.client.service-url.defaultZone=http://localhost:8050/eureka/

# ===========================
# H2 In-Memory Database
# ===========================
spring.datasource.url=jdbc:h2:mem:cinebook_profiledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (access at http://localhost:8052/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=CineBookSecretKey2024ForJWTTokenGenerationAndValidation
jwt.expiration=86400000