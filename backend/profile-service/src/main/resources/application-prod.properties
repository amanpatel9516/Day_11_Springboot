spring.application.name=profile-service

server.port=8052

# Use environment variable for Eureka URL in production
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8050/eureka/}

# ===========================
# PostgreSQL Database (Production)
# ===========================
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=${JWT_SECRET:CineBookSecretKey2024ForJWTTokenGenerationAndValidation}
jwt.expiration=86400000
